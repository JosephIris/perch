<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>cmux</title>
  <link rel="preload" href="/fonts/InterVariable.woff2"
        as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="/xterm.css" />
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar" role="navigation" aria-label="Sessions">
      <!-- Top actions. Modeled on Claude desktop's sidebar header:
           primary verb at the top, with a labeled section ("Recents")
           between it and the session list. -->
      <div class="sidebar__top-actions">
        <button id="new-session-button"
                class="sidebar__action"
                type="button">
          <span class="sidebar__action-icon" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </span>
          <span class="sidebar__action-label">New session</span>
        </button>
        <!-- Opens the dashboard (full-window attention view). Badge = how many
             projects are waiting on you. -->
        <button id="open-dashboard" class="sidebar__icon-btn" type="button"
                title="Open dashboard (Ctrl+Shift+A)" aria-label="Open dashboard">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none"
               stroke="currentColor" stroke-width="1.4">
            <rect x="2" y="2" width="5" height="5" rx="1"/>
            <rect x="9" y="2" width="5" height="5" rx="1"/>
            <rect x="2" y="9" width="5" height="5" rx="1"/>
            <rect x="9" y="9" width="5" height="5" rx="1"/>
          </svg>
          <span class="sidebar__icon-badge" id="dash-badge" style="display:none">0</span>
        </button>
      </div>
      <!-- Sections (Needs you / Projects) are rendered by sidebar.ts into
           this scroll container. -->
      <div id="sidebar-scroll" class="sidebar__scroll"></div>

      <!-- Bottom row: app identity + settings. Mirrors Claude's user-info
           row at the bottom of the sidebar. The identity block is static;
           the gear opens the settings dialog. -->
      <footer class="sidebar__footer">
        <button class="sidebar__identity" type="button"
                title="Perch" aria-label="Perch">
          <span class="sidebar__identity-mark" aria-hidden="true">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
              <!-- Perch glyph: the monocled eye (lens + eye), lens in accent -->
              <g transform="translate(12 12) scale(4.0) translate(-17 -9)">
                <circle cx="17" cy="9" r="1.95" fill="none" stroke="#76B9ED" stroke-width="0.55"/>
                <circle cx="17" cy="9" r="0.95" fill="currentColor"/>
              </g>
            </svg>
          </span>
          <span class="sidebar__identity-text">
            <span class="sidebar__identity-name">Perch</span>
            <span class="sidebar__identity-sub" id="status-text">starting…</span>
          </span>
        </button>
        <button id="settings-button" class="sidebar__settings" type="button"
                title="Settings" aria-label="Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.7"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </footer>
    </aside>

    <main id="workspace" class="workspace"></main>

    <!-- Dashboard: full-window attention view. Hidden until opened via the
         ▦ button or Ctrl+Shift+A. Rendered entirely by dashboard.ts. -->
    <section id="dashboard" class="dashboard" aria-hidden="true"></section>

    <!-- Toast surface for cmux notify messages. Same frosted acrylic
         family as the shortcut hint but anchored slightly higher and
         auto-fades after a few seconds. -->
    <div id="toast" class="toast" role="status" aria-live="polite">
      <span class="toast__dot" aria-hidden="true"></span>
      <span class="toast__text"></span>
    </div>

    <!-- Shortcut hint card. Appears after holding Ctrl+Shift for ~300ms,
         disappears the moment a modifier is released. Frosted acrylic
         background so it sits cleanly above the terminal content. -->
    <div id="shortcut-hint" class="shortcut-hint" aria-hidden="true">
      <div class="shortcut-hint__title">Ctrl + Shift</div>
      <ul class="shortcut-hint__list">
        <li><kbd>T</kbd><span>new session</span></li>
        <li><kbd>D</kbd><span>split right</span></li>
        <li><kbd>S</kbd><span>split down</span></li>
        <li><kbd>W</kbd><span>close pane</span></li>
      </ul>
    </div>
  </div>
  <script type="module" src="/app.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>cmux</title>
  <link rel="stylesheet" href="/xterm.css" />
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar" role="navigation" aria-label="Sessions">
      <ul id="session-list" class="session-list" role="list"></ul>
      <footer class="sidebar__footer">
        <button id="new-session-button"
                class="sidebar__primary"
                type="button">
          New session
        </button>
      </footer>
    </aside>

    <main id="workspace" class="workspace"></main>

    <footer class="status-bar" role="status">
      <span id="status-text">starting...</span>
    </footer>
  </div>
  <script type="module" src="/app.js"></script>
</body>
</html>

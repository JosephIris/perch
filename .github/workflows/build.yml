name: Build

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to create releases when a tag is pushed.
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    # Expose the SignPath token as a job-level env so steps can gate on its
    # presence in `if:` (secrets can't be referenced directly in `if:`; promoting
    # to job env is the documented workaround). No token (pre-onboarding, or on a
    # fork) => the signing steps skip and the release publishes unsigned.
    #
    # NOTE: code signing is NOT yet re-wired for the Velopack pipeline. The old
    # SignPath flow signed the Inno installer + portable zip as a post-build
    # GitHub-artifact pass; Velopack instead wants the exes signed DURING
    # `vpk pack` (via --signTemplate / a signtool-compatible command). Until that
    # is wired, releases publish UNSIGNED — exactly as they did before, since the
    # SignPath token was never set. See docs/CODE-SIGNING.md for the follow-up.
    env:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}

    steps:
      - uses: actions/checkout@v7

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
              $v = $env:GITHUB_REF_NAME -replace '^v', ''
          } else {
              $v = "0.1.$env:GITHUB_RUN_NUMBER"
          }
          "APP_VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "version=$v"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Output "Building version $v"

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          # No package-lock cache key here -- esbuild + xterm.js pin
          # cleanly so npm ci is fast enough without it.

      # The Perch csproj's BundleWeb target shells out to `npm run build`
      # before C# compilation; that needs node_modules in place.
      - name: Install web deps
        working-directory: src/web
        run: npm ci

      # Pre-build the web bundle BEFORE dotnet publish. The csproj's
      # <Content Include="wwwroot\**"> item is evaluated when MSBuild
      # loads the project (before any target runs), so on a fresh clone
      # where wwwroot/ doesn't exist yet the Content set is empty and
      # `dotnet publish` ships nothing under wwwroot — even though
      # BundleWeb later populates it. Running the bundler first means
      # wwwroot/ exists at evaluation time and the files get copied.
      - name: Build web bundle
        working-directory: src/web
        run: npm run build

      - name: Restore
        run: dotnet restore src/Perch/Perch.csproj

      # Velopack's packaging CLI. Produces the Setup.exe, the full/delta
      # .nupkg update feed, and the release manifest the in-app updater reads.
      - name: Install Velopack CLI (vpk)
        run: dotnet tool install -g vpk

      # Publish as a NORMAL self-contained FOLDER (not single-file). Velopack's
      # update + self-replacement machinery operates on the individual files in
      # the app folder (versioned `current/` dir + Update.exe stub), so a
      # single-file bundle would defeat delta updates and the atomic swap.
      #
      # Bonus: dropping single-file also retires the Defender packer
      # false-positive we were fighting (a *compressed* single-file decompresses
      # native DLLs at runtime, which Defender's ML read as a dropper). A plain
      # folder publish isn't self-extracting, so the heuristic never triggers —
      # which is why there's no EnableCompressionInSingleFile knob here anymore.
      - name: Publish self-contained folder
        run: |
          dotnet publish src/Perch/Perch.csproj `
            -c Release `
            -r win-x64 `
            --self-contained `
            -o publish/perch

      # Pull the latest existing release's packages so `vpk pack` can compute a
      # DELTA against them (smaller, faster updates). Tag builds only — that's
      # the only time we publish, so it's the only time a prior release to diff
      # against is relevant. Best-effort: the very first release has nothing to
      # download and pack just produces a full package.
      - name: Download previous release (for deltas)
        if: startsWith(github.ref, 'refs/tags/v')
        run: vpk download github --repoUrl https://github.com/JosephIris/perch --token ${{ secrets.GITHUB_TOKEN }}

      # Pack into Setup.exe + full/delta .nupkg + release manifest under
      # ./Releases. `--framework webview2` makes the installer ensure the
      # Evergreen WebView2 Runtime is present on first run (replacing the Inno
      # bootstrapper we used to bundle + invoke by hand). Runs on every trigger
      # so a PR/dispatch build still validates the pack end-to-end.
      - name: Pack with Velopack
        run: |
          vpk pack `
            --packId Perch `
            --packVersion $env:APP_VERSION `
            --packDir publish/perch `
            --mainExe Perch.exe `
            --packTitle Perch `
            --packAuthors JosephIris `
            --icon src/Perch/Assets/perch.ico `
            --framework webview2

      # Convenience artifact for PR / manual-dispatch runs — grab the installer
      # straight off the Actions run page. Tag builds go to GitHub Releases
      # below; routine main pushes don't need a grab-able copy. continue-on-error
      # + short retention mirror the old policy: a throwaway copy must never fail
      # the build or churn the tiny free Actions-storage quota.
      - name: Upload Setup artifact
        if: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' }}
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: Perch-Setup-${{ env.APP_VERSION }}
          path: Releases/*Setup.exe
          if-no-files-found: error
          retention-days: 5

      # ------- Release: runs only on tag pushes -------
      # `vpk upload github` creates/updates the GitHub Release for the tag and
      # attaches the Setup.exe + .nupkg feed. The in-app updater (UpdateService /
      # GithubSource) reads exactly this feed. --publish marks the release live
      # (not a draft) so users — and the auto-updater — see it immediately.
      - name: Publish GitHub Release (Velopack)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          vpk upload github `
            --repoUrl https://github.com/JosephIris/perch `
            --token ${{ secrets.GITHUB_TOKEN }} `
            --publish true `
            --releaseName "Perch $env:GITHUB_REF_NAME" `
            --tag $env:GITHUB_REF_NAME

name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/CmuxWin/CmuxWin.csproj

      - name: Build (Release, x64)
        run: dotnet build src/CmuxWin/CmuxWin.csproj -c Release --no-restore

      - name: Publish (framework-dependent, single folder)
        run: |
          dotnet publish src/CmuxWin/CmuxWin.csproj `
            -c Release `
            -r win-x64 `
            --no-self-contained `
            -o publish/cmux-win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cmux-win-${{ github.sha }}
          path: publish/cmux-win
          if-no-files-found: error
